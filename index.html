<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yutoob — Single File</title>
    <style>
      :root{
        --bg:#0f1724;
        --surface:#0b1220;
        --muted:#9aa6bd;
        --accent:#ff3b30;
        --brand:#6c5ce7;
        --card:#0f1728;
        --glass: rgba(255,255,255,0.04);
      }
      *{box-sizing:border-box}
      body{margin:0;background:linear-gradient(180deg,#071028 0%,#071021 40%,#081226 100%);color:#e6eef8;font-family:Inter,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
      a.skip{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
      a.skip:focus{left:12px;top:12px;background:#fff;color:#000;padding:8px 12px;border-radius:6px;text-decoration:none}
      .topbar{height:64px;display:flex;align-items:center;padding:0 20px;background:transparent;border-bottom:1px solid rgba(255,255,255,0.04)}
      .logo{font-weight:800;color:var(--brand);font-size:22px;margin-right:18px;letter-spacing:0.6px}
      .search{flex:1;max-width:680px;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--muted)}
      .layout{display:flex;gap:20px;padding:18px}
      .sidebar{width:220px;padding:12px}
      .side-item{padding:10px;border-radius:8px;color:var(--muted);margin-bottom:8px}
      .side-item.active{background:rgba(255,255,255,0.03);color:#fff}
      .main{flex:1}
      .hero{display:flex;align-items:center;justify-content:space-between;padding:22px;border-radius:12px;background:linear-gradient(90deg, rgba(108,92,231,0.15), rgba(255,59,48,0.1));margin-bottom:18px}
      .hero h1{margin:0;font-size:22px;color:#fff}
      .hero p{margin:6px 0 0;color:var(--muted)}
      .hero .cta{display:flex;gap:10px}
      .cta .btn-primary{background:linear-gradient(90deg,var(--brand),var(--accent));color:#fff;padding:8px 12px;border-radius:10px;border:0;cursor:pointer}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
      .video-card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));cursor:pointer;border-radius:12px;overflow:hidden;position:relative;transition:transform .18s ease,box-shadow .18s ease}
      .video-card:focus{outline:3px solid rgba(108,92,231,0.28);transform:translateY(-6px);box-shadow:0 10px 30px rgba(2,6,23,0.6)}
      .video-card:hover{transform:translateY(-6px);box-shadow:0 8px 24px rgba(2,6,23,0.6)}
      .thumb{position:relative}
      .thumb img{width:100%;height:150px;object-fit:cover;background:#000;display:block}
      .thumb::after{content:'';position:absolute;left:0;right:0;bottom:0;height:48px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.4));}
      .score-badge{position:absolute;left:8px;top:8px;background:linear-gradient(90deg,var(--brand),var(--accent));color:#fff;padding:6px 8px;border-radius:999px;font-size:12px;font-weight:700}
      .like-btn{position:absolute;right:8px;top:8px;background:rgba(255,255,255,0.06);border:0;padding:6px;border-radius:8px;cursor:pointer;color:#fff}
      .meta{padding:12px}
      .title{font-size:15px;font-weight:700;color:#fff}
      .channel{font-size:13px;color:var(--muted);margin-top:6px}
      .modal{position:fixed;inset:0;background:linear-gradient(180deg,rgba(2,6,23,0.6),rgba(2,6,23,0.9));display:flex;align-items:center;justify-content:center;padding:24px}
      .player{width:900px;max-width:100%;background:linear-gradient(180deg,#071430,#051026);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
      .player video{width:100%;height:520px;background:#000;display:block}
      .player-title{padding:12px;font-weight:700;color:#fff}
      @media (max-width:900px){.sidebar{display:none}.player video{height:260px}}
      .btn{padding:8px 12px;border-radius:8px;border:0;background:rgba(255,255,255,0.04);cursor:pointer;color:#fff}
      .btn:focus{outline:3px solid rgba(255,255,255,0.06)}
      .stats-debug{position:fixed;right:12px;bottom:12px;background:rgba(10,14,22,0.9);padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);max-width:360px;max-height:320px;overflow:auto;font-size:12px;color:var(--muted)}
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
    (function(){
      // Sample videos
      const videos = [
        {id:1,title:'Big Buck Bunny',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',poster:'https://peach.blender.org/wp-content/uploads/title_anouncement.jpg?x11217'},
        {id:2,title:'Elephants Dream',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',poster:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/ElephantsDream.png/640px-ElephantsDream.png'},
        {id:3,title:'For Bigger Blazes',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',poster:''},
        {id:4,title:'Sintel Trailer',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4',poster:'https://durian.blender.org/wp-content/uploads/2010/05/sintel_post.jpg'},
        {id:5,title:'Tears of Steel',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4',poster:''},
        {id:6,title:'For Bigger Escape',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4',poster:''},
        {id:7,title:'Subaru Outback',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4',poster:''},
        {id:8,title:'Volkswagen GTI Review',src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/VolkswagenGTIReview.mp4',poster:''}
      ]

      const STORAGE_KEY = 'yutoob_stats'
      let stats = {}
      try{ stats = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') }catch(e){ stats = {} }

      function saveStats(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)) }

      function recommend(list){
        return list.slice().map(v=>{
          const s = stats[v.id] || {watchTime:0,liked:false}
          const score = (s.watchTime||0) + (s.liked?600:0)
          return Object.assign({},v,{score})
        }).sort((a,b)=>b.score-a.score)
      }

      // DOM helpers
      const $ = sel => document.querySelector(sel)
      const $$ = sel => Array.from(document.querySelectorAll(sel))

      // Render app
      function render(){
        const root = document.getElementById('app')
        root.innerHTML = ''

        const topbar = document.createElement('header')
        topbar.className='topbar'
        topbar.innerHTML = `<a class="skip" href="#main-content">Skip to content</a><div class="logo">Yutoob</div><input class="search" placeholder="Search" aria-label="Search videos">`

        const layout = document.createElement('div'); layout.className='layout'
        const sidebar = document.createElement('aside'); sidebar.className='sidebar'; sidebar.setAttribute('role','navigation'); sidebar.innerHTML='<div class="side-item active">Home</div><div class="side-item">Trending</div><div class="side-item">Subscriptions</div>'
        const main = document.createElement('main'); main.className='main'; main.id='main-content'; main.setAttribute('role','main');
        main.innerHTML = '<h2>Recommended</h2>'

        const hero = document.createElement('section'); hero.className='hero'; hero.innerHTML = `<div><h1>Discover videos you'll love</h1><p>Personalized picks based on what you watch and like.</p></div><div class="cta"><button class="btn-primary" onclick="document.querySelector('.search').focus()">Try Search</button></div>`
        main.appendChild(hero)

        const grid = document.createElement('div'); grid.className='grid'

        const list = recommend(videos)
        list.forEach(v=>{
          const s = stats[v.id] || {watchTime:0,liked:false}
          const watched = Math.floor((s.watchTime||0)/60)
          const badgeText = s.liked ? '♥' : (s.watchTime > 120 ? '🔥' : (watched ? watched + 'm' : 'New'))
          const card = document.createElement('div'); card.className='video-card'
          card.tabIndex = 0
          card.setAttribute('role','button')
          card.setAttribute('aria-label', `Open video ${v.title}`)
          const poster = v.poster || 'https://via.placeholder.com/320x180?text=Video'
          card.innerHTML = `<div class="thumb"><img src="${poster}" alt="${v.title}"><div class="score-badge">${badgeText}</div><button class="like-btn" aria-label="${s.liked ? 'Unlike' : 'Like'}">${s.liked ? '♥' : '♡'}</button></div><div class="meta"><div class="title">${v.title}</div><div class="channel">Yutoob Channel • ${watched} min</div></div>`
          // click to open
          card.addEventListener('click',()=>openPlayer(v))
          card.addEventListener('keydown',e=>{ if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPlayer(v) } })
          // like button
          const likeBtn = card.querySelector('.like-btn')
          likeBtn.addEventListener('click',e=>{ e.stopPropagation(); toggleLike(v.id); likeBtn.setAttribute('aria-label', (stats[v.id] && stats[v.id].liked) ? 'Unlike' : 'Like') })
          grid.appendChild(card)
        })

        main.appendChild(grid)
        layout.appendChild(sidebar)
        layout.appendChild(main)
        root.appendChild(topbar)
        root.appendChild(layout)

        renderDebug()
      }

      // Player
      let current = null
      let playStart = null

      function openPlayer(v){
        current = v
        const modal = document.createElement('div'); modal.className='modal'
        const player = document.createElement('div'); player.className='player'
        player.innerHTML = `<video controls autoplay src="${v.src}" poster="${v.poster||''}"></video><div class="player-title">${v.title}</div><div style="padding:0 12px 12px"><button id="player-like" class="btn">${(stats[v.id]&&stats[v.id].liked)?'Unlike':'Like'}</button></div>`
        modal.appendChild(player)
        modal.addEventListener('click',closePlayer)
        player.addEventListener('click',e=>e.stopPropagation())
        document.body.appendChild(modal)

        const videoEl = player.querySelector('video')
        videoEl.addEventListener('play',()=>{
          playStart = Date.now()
        })
        function addDelta(){
          if(!playStart) return
          const delta = Math.floor((Date.now()-playStart)/1000)
          playStart = null
          stats[v.id] = stats[v.id] || {watchTime:0,liked:false}
          stats[v.id].watchTime = (stats[v.id].watchTime||0) + delta
          saveStats()
          render()
        }
        videoEl.addEventListener('pause', addDelta)
        videoEl.addEventListener('ended', addDelta)

        const likeBtn = player.querySelector('#player-like')
        likeBtn.addEventListener('click',()=>{ toggleLike(v.id); likeBtn.textContent = (stats[v.id]&&stats[v.id].liked)?'Unlike':'Like' })
      }

      function closePlayer(){
        // if video playing, add delta
        if(playStart && current){
          const delta = Math.floor((Date.now()-playStart)/1000)
          stats[current.id] = stats[current.id] || {watchTime:0,liked:false}
          stats[current.id].watchTime = (stats[current.id].watchTime||0) + delta
          playStart = null
        }
        const modal = document.querySelector('.modal')
        if(modal) modal.remove()
        current = null
        saveStats()
        render()
      }

      function toggleLike(id){
        stats[id] = stats[id] || {watchTime:0,liked:false}
        stats[id].liked = !stats[id].liked
        saveStats()
        render()
      }

      // Debug view (optional)
      function renderDebug(){
        let dbg = document.querySelector('.stats-debug')
        if(!dbg){ dbg = document.createElement('div'); dbg.className='stats-debug'; document.body.appendChild(dbg) }
        dbg.innerHTML = '<strong>Stats (localStorage)</strong><br/>' + Object.keys(stats).map(k=>{
          const s = stats[k]; return `#${k}: ${s.watchTime || 0}s ${s.liked? '♥':' '}`
        }).join('<br/>')
      }

      // initial render
      render()

      // expose for console debugging
      window.__YUTOOB = { videos, stats, recommend }
    })()
    </script>
  </body>
</html>
